<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Family Digital Agreement</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      margin-right: 12px;
    }
    .header-text h1 {
      font-size: 16px;
      margin: 0;
      color: #1f2937;
    }
    .header-text p {
      font-size: 12px;
      margin: 4px 0 0;
      color: #6b7280;
    }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .status.info {
      background: #dbeafe;
      color: #1e40af;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
      border-color: #9ca3af;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label {
      font-size: 14px;
      color: #374151;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #d1d5db;
      transition: .3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #6366f1;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">FDA</div>
    <div class="header-text">
      <h1 id="headerTitle">Family Digital Agreement</h1>
      <p>Transparent tracking for your family</p>
    </div>
  </div>

  <div id="status" class="status info hidden"></div>

  <!-- Setup Section -->
  <div id="setup-section" class="section">
    <div class="section-title">Setup</div>
    <div class="form-group">
      <label for="apiUrl">Web App URL</label>
      <input type="url" id="apiUrl" placeholder="https://your-app.vercel.app">
      <small style="color: #6b7280; font-size: 11px;">Your family dashboard URL</small>
    </div>
    <div class="form-group">
      <label for="userId">Your User ID</label>
      <input type="text" id="userId" placeholder="Your user ID">
    </div>
    <div class="form-group">
      <label for="familyId">Family ID</label>
      <input type="text" id="familyId" placeholder="Your family ID">
    </div>
    <button id="saveBtn" class="btn-primary">Save Configuration</button>
  </div>

  <!-- User Info Section -->
  <div id="user-section" class="section hidden">
    <div class="section-title">Account</div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
      <div>
        <div id="userDisplay" style="font-size: 14px; color: #374151; font-weight: 500;"></div>
        <div style="font-size: 11px; color: #6b7280;">Logged in</div>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>
  </div>

  <!-- Control Section -->
  <div id="control-section" class="section hidden">
    <div class="section-title">Monitoring</div>
    <div class="toggle-row">
      <span class="toggle-label">Enable tracking</span>
        <label class="toggle">
          <input type="checkbox" id="enabledToggle">
          <span class="toggle-slider"></span>
        </label>
    </div>
    <button id="syncRulesBtn" class="btn-secondary" style="margin-top: 12px; width: auto;">🔄 Sync Rules Now</button>
    <p style="font-size: 12px; color: #6b7280; margin-top: 8px;">
      When enabled, the extension will track websites you visit and send data to your family dashboard. All data is visible to your parents/guardians.
    </p>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
