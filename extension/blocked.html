<!DOCTYPE html>
<html>
<head>
  <title>Access Restricted</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #2d3748;
    }
    .card {
      background: white;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      max-width: 500px;
      text-align: center;
    }
    .icon {
      background: #fed7d7;
      color: #c53030;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.875rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: #1a202c;
    }
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #4a5568;
      margin-bottom: 2rem;
    }
    .footer {
      font-size: 0.875rem;
      color: #718096;
      border-top: 1px solid #edf2f7;
      padding-top: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: #ebf4ff;
      color: #2b6cb0;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <h1>Access Restricted</h1>
    <p>This website is currently limited by your <strong>Family Digital Agreement</strong> to help maintain healthy digital boundaries.</p>
    <div class="footer">
      <p>Talk to your parent to adjust these rules together.</p>
      <div class="badge">Rule Enforced</div>
    </div>
  </div>
</body>
</html>
