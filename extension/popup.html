<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Family Digital Agreement</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background-color: #f9fafb;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      margin-right: 12px;
    }
    .header-text h1 {
      font-size: 16px;
      margin: 0;
      color: #1f2937;
    }
    .header-text p {
      font-size: 12px;
      margin: 4px 0 0;
      color: #6b7280;
    }
    .section {
      margin-bottom: 16px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.info { background: #dbeafe; color: #1e40af; }
    
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      width: auto;
    }
    
    /* Member List */
    .member-item {
      display: flex;
      align-items: center;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #f3f4f6;
      margin-bottom: 6px;
    }
    .member-item.active {
      background: #f5f3ff;
      border-color: #ddd6fe;
    }
    .member-avatar {
      width: 32px;
      height: 32px;
      background: #e5e7eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      color: #4b5563;
      margin-right: 12px;
    }
    .member-info { flex: 1; }
    .member-name { font-size: 14px; font-weight: 500; color: #111827; }
    .member-role { font-size: 11px; color: #6b7280; text-transform: capitalize; }
    
    .btn-switch {
      padding: 4px 8px;
      font-size: 11px;
      background: #6366f1;
      color: white;
      border-radius: 4px;
      width: auto;
    }
    .btn-switch.current { background: #10b981; }

    /* PIN Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 240px;
      text-align: center;
    }
    .pin-input {
      letter-spacing: 0.5em;
      font-size: 24px;
      text-align: center;
      font-family: monospace;
      margin: 12px 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #d1d5db;
      transition: .3s; border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .3s; border-radius: 50%;
    }
    input:checked + .toggle-slider { background-color: #6366f1; }
    input:checked + .toggle-slider:before { transform: translateX(20px); }
    
    .hidden { display: none; }
    .force-tracking-badge {
      background: #fee2e2;
      color: #991b1b;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">FDA</div>
    <div class="header-text">
      <h1 id="headerTitle">Family Digital Agreement</h1>
      <p>Transparent tracking for your family</p>
    </div>
  </div>

  <div id="status" class="status info hidden"></div>

  <!-- Setup Section -->
  <div id="setup-section" class="section">
    <div class="section-title">Join Family</div>
    <div class="form-group">
      <label for="apiUrl">Family Web App URL</label>
      <input type="url" id="apiUrl" placeholder="https://your-family.vercel.app">
    </div>
    <div class="form-group">
      <label for="inviteCode">Family Invite Code</label>
      <input type="text" id="inviteCode" placeholder="ABC-123" maxlength="7" style="text-transform: uppercase; font-family: monospace; font-weight: bold; letter-spacing: 1px;">
      <p style="font-size: 11px; color: #6b7280; margin-top: 4px;">Get this code from your parent's dashboard.</p>
    </div>
    <button id="joinBtn" class="btn-primary">Join Family</button>
  </div>

  <!-- Main Section (After Joined) -->
  <div id="main-section" class="hidden">
    <!-- Active User -->
    <div class="section">
      <div class="section-title">
        Current User
        <span id="forceBadge" class="force-tracking-badge hidden">AUTO-TRACK ON</span>
      </div>
      <div class="member-item active">
        <div id="activeAvatar" class="member-avatar">?</div>
        <div class="member-info">
          <div id="activeName" class="member-name">Loading...</div>
          <div id="activeRole" class="member-role">...</div>
        </div>
        <div id="trackingStatus" style="font-size: 10px; font-weight: bold; color: #10b981;">TRACKING</div>
      </div>
      
      <div class="toggle-row">
        <span style="font-size: 13px; color: #374151;">Tracking Enabled</span>
        <label class="toggle">
          <input type="checkbox" id="enabledToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Family Switcher -->
    <div class="section">
      <div class="section-title">Switch User</div>
      <div id="memberList">
        <!-- Members will be injected here -->
      </div>
      <div style="margin-top: 12px; display: flex; gap: 8px;">
        <button id="syncRulesBtn" class="btn-secondary" style="flex: 1;">Sync Rules</button>
        <button id="logoutBtn" class="btn-secondary" style="flex: 0; background: #fee2e2; border-color: #fca5a5; color: #991b1b;">Exit</button>
      </div>
    </div>
  </div>

  <!-- PIN Modal -->
  <div id="pinModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 style="font-size: 16px; margin: 0 0 8px;">Enter PIN</h3>
      <p style="font-size: 12px; color: #6b7280;">Please enter your parent PIN to switch to this account.</p>
      <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••">
      <div style="display: flex; gap: 8px; margin-top: 16px;">
        <button id="cancelPinBtn" class="btn-secondary" style="flex: 1;">Cancel</button>
        <button id="confirmPinBtn" class="btn-primary" style="flex: 1;">Confirm</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
